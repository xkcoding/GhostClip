<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  <!-- Accent Bar -->
  <rect width="600" height="3" fill="url(#barGrad)"/>
  <!-- Ghost Decoration -->
  <path transform="translate(280,30)" d="M20 0c11 0 20 9 20 20l0 9c0 4-4 7-7 6-4-1-4-5-7-5-2 0-2 4-6 6-4-2-4-6-6-6-3 0-3 4-7 5-3 1-7-2-7-6l0-9c0-11 9-20 20-20z" fill="#22C55E" opacity="0.15"/>
  <!-- Title -->
  <text x="300" y="92" text-anchor="middle" font-family="PingFang SC, -apple-system, Helvetica Neue, sans-serif" font-size="20" font-weight="700" fill="#166534">GhostClip</text>
  <!-- Arrow (center, between default icon positions) -->
  <line x1="230" y1="200" x2="355" y2="200" stroke="#22C55E" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <polygon points="365,200 350,190 350,210" fill="#22C55E" opacity="0.5"/>
  <!-- Instruction -->
  <text x="300" y="340" text-anchor="middle" font-family="PingFang SC, -apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#9CA3AF">拖拽到「应用程序」文件夹以完成安装</text>
  <text x="300" y="362" text-anchor="middle" font-family="PingFang SC, -apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#9CA3AF" opacity="0.5">首次打开：右键点击 GhostClip → 选择「打开」</text>
</svg>
