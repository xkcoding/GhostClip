<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>

  <path transform="translate(310,28)" d="M20 0c11 0 20 9 20 20l0 9c0 4-4 7-7 6-4-1-4-5-7-5-2 0-2 4-6 6-4-2-4-6-6-6-3 0-3 4-7 5-3 1-7-2-7-6l0-9c0-11 9-20 20-20z" fill="#22C55E" opacity="0.15"/>

  <text x="330" y="362" text-anchor="middle" font-family="PingFang SC, -apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#9CA3AF" opacity="0.5">首次打开：右键点击 GhostClip → 选择「打开」</text>
