<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.125)"/>
    </filter>
  </defs>
  <g transform="translate(40,40)">
    <!-- Background with rounded corners -->
    <rect width="400" height="400" rx="72" fill="url(#bg)"/>
    <!-- Ghost Body with shadow -->
    <g filter="url(#shadow)">
      <path transform="translate(80,60)" d="M120 0c66 0 120 54 120 120l0 100c0 25-15 40-40 40-25 0-25-30-40-30-15 0-15 30-40 30-25 0-25-30-40-30-15 0-15 30-40 30-25 0-40-15-40-40l0-100c0-66 54-120 120-120z" fill="white"/>
    </g>
    <!-- Envelope Flap -->
    <path transform="translate(135,205)" d="M0 30l65-30 65 30z" fill="#16A34A"/>
    <!-- Envelope Body (top-square, bottom-rounded) -->
    <path d="M135 235 L265 235 L265 282 A8 8 0 0 1 257 290 L143 290 A8 8 0 0 1 135 282 Z" fill="#22C55E"/>
    <!-- Envelope Fold lines -->
    <path transform="translate(140,238)" d="M0 0l60 26 60-26" stroke="#15803D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Left Eye -->
    <ellipse cx="164" cy="150" rx="12" ry="15" fill="#1E293B"/>
    <!-- Right Eye -->
    <ellipse cx="236" cy="150" rx="12" ry="15" fill="#1E293B"/>
    <!-- Left Highlight -->
    <ellipse cx="163.5" cy="142.5" rx="4.5" ry="4.5" fill="white"/>
    <!-- Right Highlight -->
    <ellipse cx="235.5" cy="142.5" rx="4.5" ry="4.5" fill="white"/>
    <!-- Left Cheek -->
    <ellipse cx="147" cy="184" rx="14" ry="7" fill="#FCA5A5" opacity="0.35"/>
    <!-- Right Cheek -->
    <ellipse cx="253" cy="184" rx="14" ry="7" fill="#FCA5A5" opacity="0.35"/>
    <!-- Mouth -->
    <path transform="translate(190,187)" d="M0 0q10 6 20 0" stroke="#64748B" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
