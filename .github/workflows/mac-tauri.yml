name: Mac Tauri Build

on:
  push:
    paths:
      - 'mac/**'
      - '.github/workflows/mac-tauri.yml'
  workflow_dispatch:

jobs:
  check:
    name: Cargo Check & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mac/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mac/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo check
        working-directory: mac/src-tauri
        run: cargo check --release 2>&1

      - name: Cargo test
        working-directory: mac/src-tauri
        run: cargo test -- --test-threads=1

  build:
    name: Build Tauri App
    runs-on: macos-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mac/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mac/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri app
        working-directory: mac
        run: cargo tauri build

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostclip-mac-dmg
          path: mac/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostclip-mac-app
          path: mac/src-tauri/target/release/bundle/macos/*.app
          retention-days: 30
