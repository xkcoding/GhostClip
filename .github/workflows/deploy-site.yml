# Deploy Landing Page to Cloudflare Pages
#
# 前置配置：
# 1. 在 Cloudflare 面板创建 Pages 项目，名称为 "ghostclip"
# 2. 配置 GitHub Secrets：
#    - CLOUDFLARE_API_TOKEN: Cloudflare API Token（需要 Pages 编辑权限）
#    - CLOUDFLARE_ACCOUNT_ID: Cloudflare Account ID
# 3. （可选）在 Cloudflare Web Analytics 面板创建站点，获取 token 填入 Layout.astro

name: Deploy Landing Page

on:
  push:
    branches: [main]
    paths: ['site/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build Astro site
        run: npm run build
        working-directory: site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=ghostclip
